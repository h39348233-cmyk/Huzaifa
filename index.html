<!DOCTYPE html>
<html>
<head>
<title>Huzaifa</title>
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(45deg,#00c6ff,#0072ff,#7b2ff7);
font-family:Arial;
overflow:hidden;
}
.card{
background:rgba(255,255,255,.15);
padding:30px;
border-radius:20px;
color:white;
text-align:center;
animation:float 5s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}
</style>
</head>
<body>
<div class="card">
<h1>Hi, I'm Huzaifa 👋</h1>
<p>Welcome to my Personal Website</p>
</div>
</body>
</html>
